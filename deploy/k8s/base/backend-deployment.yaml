apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: artifact-keeper
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: artifact-keeper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/artifact-keeper/artifact-keeper-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: artifact-keeper-secrets
                  key: db-password
            - name: DATABASE_URL
              value: postgresql://registry:$(DB_PASSWORD)@postgres:5432/artifact_registry
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: artifact-keeper-secrets
                  key: jwt-secret
          envFrom:
            - configMapRef:
                name: artifact-keeper-config
          volumeMounts:
            - name: artifact-storage
              mountPath: /data/storage
            - name: backup-storage
              mountPath: /data/backups
            - name: plugins-storage
              mountPath: /data/plugins
            - name: scan-workspace
              mountPath: /scan-workspace
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: artifact-storage
          persistentVolumeClaim:
            claimName: artifact-storage-pvc
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-storage-pvc
        - name: plugins-storage
          persistentVolumeClaim:
            claimName: plugins-storage-pvc
        - name: scan-workspace
          emptyDir: {}
