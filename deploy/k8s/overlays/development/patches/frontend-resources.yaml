# Development: lower resource limits for frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: artifact-keeper
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
